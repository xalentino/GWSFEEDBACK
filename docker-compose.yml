services:
  feedbase:
    restart: "unless-stopped"
    tty: true
    build: "."
    environment:
      SESSION_SECRET: ${SESSION_SECRET}
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}
    depends_on:
      db: # Disable this if you are using an external Postgres database
        condition: service_healthy
    ports:
      - "3000:3000" # This is in the format of <host_port>:<container_port>. You can change the host port, but not the container port.

  # Comment out everything below this point if you are using an external Postgres database
  db:
    image: "postgres:latest"
    healthcheck:
      test: pg_isready -U ${POSTGRES_USER} -h localhost
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT:-5432}:5432
    volumes:
      - db:/var/lib/postgresql

volumes:
  db:
    driver: local